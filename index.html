<body>

    <div class="container">


        <!-- Content Wrapper for vertical centering -->

            <!-- Countdown Timer -->

    <!-- Lucky Number Modal -->
    <div id="lucky-modal" class="lucky-number-modal">
        <h3>🎉 今日幸運號碼 🎉</h3>

            <div class="lucky-number" id="lucky-num-1">0000</div>
            <div class="lucky-number" id="lucky-num-2">0000</div>
        </div>
        <button class="lucky-close-btn" id="lucky-close">關閉</button>
    </div>

    <!-- Share as Image Button -->
    <button class="share-button" id="share-button" aria-label="Share as image" title="Share as image">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
            <polyline points="16 6 12 2 8 6"></polyline>
            <line x1="12" y1="2" x2="12" y2="15"></line>
        </svg>
    </button>

    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function () {
            updateCalendar();
            updateCountdown();
            updateDayProgress();
            checkNightMode();
            checkLunarNotification();

            // Update countdown every second
            setInterval(updateCountdown, 1000);

            // Update day progress every minute
            setInterval(updateDayProgress, 60000);

            // Check night mode every minute
            setInterval(checkNightMode, 60000);

            // Check lunar notification every hour
            setInterval(checkLunarNotification, 3600000);

            // Setup notification close button
            document.getElementById('notification-close').addEventListener('click', dismissNotification);

            // Festive Popup Logic
            const festivePopup = document.getElementById('festive-popup');
            if (festivePopup) {
                setTimeout(() => {
                    festivePopup.classList.add('show');
                }, 500);

                document.getElementById('festive-popup-close').addEventListener('click', () => {
                    festivePopup.classList.remove('show');
                });

                festivePopup.addEventListener('click', (e) => {
                    if (e.target === festivePopup) {
                        festivePopup.classList.remove('show');
                    }
                });
            }
        });

        // Update calendar with current date
        function updateCalendar() {
            const now = new Date();
            const solar = Solar.fromDate(now);
            const lunar = Lunar.fromDate(now);

            // Update date elements
            document.getElementById('year').textContent = solar.getYear();
            document.getElementById('month').textContent = solar.getMonth();
            document.getElementById('day').textContent = String(solar.getDay()).padStart(2, '0');

            // Update weekday
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('weekday').textContent = weekdays[solar.getWeek()];

            // Update lunar date - use numeric month format (十一月 instead of 冬月)
            const monthChineseMap = {
                1: '一', 2: '二', 3: '三', 4: '四', 5: '五', 6: '六',
                7: '七', 8: '八', 9: '九', 10: '十', 11: '十一', 12: '十二'
            };
            lunarMonthNum = lunar.getMonth(); // Set global variable for language toggle
            lunarDayNum = lunar.getDay(); // Set global variable for language toggle
            const lunarMonthChinese = monthChineseMap[lunarMonthNum] || lunarMonthNum;
            const lunarDay = lunar.getDayInChinese();
            document.getElementById('lunar-date').textContent = lunarMonthChinese + '月' + lunarDay;

            // Update activities (Yi & Ji) - limit to 3 items each
            const yiItems = lunar.getDayYi().slice(0, 3);
            const jiItems = lunar.getDayJi().slice(0, 3);
            document.getElementById('activities').innerHTML =
                '<img src="static/ji-icon.png" alt="宜" class="yi-ji-icon"> ' + yiItems.join('，') +
                ' | <img src="static/yi-icon.png" alt="忌" class="yi-ji-icon"> ' + jiItems.join('，');

            // Update daily quote - Deterministic selection based on date
            // Special handling for February 2026 (Year of the Horse)
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1; // 1-12
            const day = today.getDate();

            let dailyQuote;

            if (year === 2026 && month === 2) {
                // February 2026: Year of the Horse quotes (28 quotes for 28 days)
                const februaryQuotes = [
                    '龍馬精神',    // Feb 1
                    '馬到成功',    // Feb 2
                    '一馬當先',    // Feb 3
                    '萬馬奔騰',    // Feb 4
                    '馬年大吉',    // Feb 5
                    '馬年發財',    // Feb 6
                    '金馬迎春',    // Feb 7
                    '駿馬騰飛',    // Feb 8
                    '躍馬揚鞭',    // Feb 9
                    '驍馬迎祥',    // Feb 10
                    '天馬行空',    // Feb 11
                    '龍騰馬躍',    // Feb 12
                    '福馬迎新',    // Feb 13
                    '策馬前進',    // Feb 14
                    '奔馬報喜',    // Feb 15
                    '神馬獻瑞',    // Feb 16
                    '馬年新禧',    // Feb 17 (CNY)
                    '馬歲報佳音',  // Feb 18
                    '馬到新春',    // Feb 19
                    '馬騰盛世',    // Feb 20
                    '千里良馬',    // Feb 21
                    '龍精虎馬',    // Feb 22
                    '馬到福至',    // Feb 23
                    '迎春接馬',    // Feb 24
                    '瑞馬呈祥',    // Feb 25
                    '馬步青雲',    // Feb 26
                    '捷報馬傳',    // Feb 27
                    '順利馬年'     // Feb 28
                ];

                // Use day of month (1-28) as direct index (subtract 1 for 0-based array)
                dailyQuote = februaryQuotes[day - 1] || februaryQuotes[0];
            } else {
                // All other months: Use deterministic hash-based selection
                const quotes = [
                    '吉祥如意', '萬事大吉', '心想事成', '五福臨門', '招財進寶',
                    '和氣生財', '金玉滿堂', '花開富貴', '國泰民安', '身體健康',
                    '步步高升', '大吉大利', '財源廣進', '恭喜發財', '年年有餘',
                    '龍馬精神', '鴻運當頭', '福星高照', '萬事如意', '事事順心',
                    '平安喜樂', '闔家歡樂', '福壽雙全', '福如東海', '壽比南山',
                    '笑口常開', '青春永駐', '前程似錦', '錦繡前程', '鵬程萬里',
                    '一帆風順', '馬到成功', '功成名就', '名列前茅', '出類拔萃',
                    '學業進步', '才高八斗', '學富五車', '滿腹經綸', '博學多才',
                    '事業有成', '飛黃騰達', '平步青雲', '扶搖直上', '蒸蒸日上',
                    '日進斗金', '財運亨通', '生意興隆', '貨如輪轉', '客似雲來',
                    '家和萬事興', '闔家平安', '天倫之樂', '其樂融融', '幸福美滿',
                    '百年好合', '白頭偕老', '永結同心', '琴瑟和鳴', '鸞鳳和鳴',
                    '喜氣洋洋', '春風得意', '眉開眼笑', '喜上眉梢', '喜氣盈門',
                    '萬象更新', '欣欣向榮', '蓬勃發展', '日新月異', '與時俱進',
                    '龍騰虎躍', '虎虎生威', '生龍活虎', '龍飛鳳舞', '龍鳳呈祥',
                    '紫氣東來', '瑞氣千條', '祥雲繚繞', '福氣滿堂', '喜氣沖天',
                    '四季平安', '歲歲平安', '出入平安', '一路平安', '竹報平安',
                    '吉星高照', '福星拱照', '吉慶有餘', '吉人天相', '天賜良緣',
                    '心曠神怡', '神采奕奕', '精神煥發', '容光煥發', '煥然一新',
                    '如意吉祥', '稱心如意', '萬事勝意', '諸事大吉', '百事可樂',
                    '六六大順', '七星高照', '八方來財', '九九歸一', '十全十美',
                    '百福駢臻', '千祥雲集', '萬事亨通', '億萬富翁', '財源滾滾'
                ];

                // Create a simple hash from the date
                const dateString = `${year}-${month}-${day}`;
                let hash = 0;
                for (let i = 0; i < dateString.length; i++) {
                    hash = ((hash << 5) - hash) + dateString.charCodeAt(i);
                    hash = hash & hash; // Convert to 32-bit integer
                }

                // Use absolute value and modulo to get index
                const index = Math.abs(hash) % quotes.length;
                dailyQuote = quotes[index];
            }

            document.getElementById('daily-quote').textContent = dailyQuote;
        }

        // Update countdown to Chinese New Year (Feb 17, 2026)
        function updateCountdown() {
            const now = new Date().getTime();
            const cnyDate = new Date('2026-02-17T00:00:00').getTime();
            const distance = cnyDate - now;

            if (distance < 0) {
                // After CNY: Show greeting message
                document.getElementById('countdown-text').textContent = 'Lak-Jit恭祝大家 恭喜發財！萬事如意！馬年行大運';
                document.getElementById('countdown-days').textContent = '';
                document.getElementById('countdown-hours').textContent = '';
                document.getElementById('countdown-minutes').textContent = '';
                document.getElementById('countdown-seconds').textContent = '';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('countdown-days').textContent = days;
            document.getElementById('countdown-hours').textContent = hours;
            document.getElementById('countdown-minutes').textContent = minutes;
            document.getElementById('countdown-seconds').textContent = seconds;
        }

        // Update day progress bar
        function updateDayProgress() {
            const now = new Date();
            const secondsSinceMidnight = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            const totalSecondsInDay = 24 * 3600;
            const progress = (secondsSinceMidnight / totalSecondsInDay) * 100;

            document.getElementById('progress-bar').style.width = progress + '%';
        }

        // ============================================
        // LANGUAGE & THEME TOGGLE FUNCTIONALITY
        // ============================================

        // Lunar date numeric values from updateCalendar
        let lunarMonthNum = 1;
        let lunarDayNum = 1;

        // Zen quotes from JSON file
        let zenQuotes = [];
        let selectedZenQuote = '';

        // Fetch Zen quotes from JSON
        async function fetchQuotes() {
            try {
                const response = await fetch('static/quotes.json');
                const data = await response.json();
                zenQuotes = data.quotes;

                // Deterministic quote selection based on current date
                const today = new Date();
                const dateString = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
                const hashValue = dateString.split('').reduce((acc, char, i) => acc + char.charCodeAt(0) * (i + 1), 0);
                const quoteIndex = hashValue % zenQuotes.length;
                selectedZenQuote = zenQuotes[quoteIndex];
            } catch (error) {
                console.error('Failed to load quotes:', error);
                selectedZenQuote = 'Peace and prosperity'; // Fallback
            }
        }

        // Load quotes immediately
        fetchQuotes();

        // Store original Chinese content
        let originalQuote = '';
        let originalDateHeader = '';
        let originalWeekday = '';

        // Initialize from localStorage or defaults
        let currentLang = localStorage.getItem('lakjit-language') || 'cn';
        let currentTheme = localStorage.getItem('lakjit-theme') || 'auto';

        // DOM Elements
        const languageToggle = document.getElementById('language-toggle');
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.querySelector('.sun-icon');
        const moonIcon = document.querySelector('.moon-icon');

        // Weekday translation mapping
        const weekdayMap = {
            '星期一': 'Monday',
            '星期二': 'Tuesday',
            '星期三': 'Wednesday',
            '星期四': 'Thursday',
            '星期五': 'Friday',
            '星期六': 'Saturday',
            '星期日': 'Sunday'
        };

        // Month translation mapping
        const monthMap = {
            '1': 'January', '2': 'February', '3': 'March', '4': 'April',
            '5': 'May', '6': 'June', '7': 'July', '8': 'August',
            '9': 'September', '10': 'October', '11': 'November', '12': 'December'
        };

        // Lunar month translation
        const lunarMonthMap = {
            '1': 'January', '2': 'February', '3': 'March', '4': 'April',
            '5': 'May', '6': 'June', '7': 'July', '8': 'August',
            '9': 'September', '10': 'October', '11': 'November', '12': 'December'
        };

        // Language Toggle Function
        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lakjit-language', lang);
            languageToggle.setAttribute('data-lang', lang);

            const dailyQuoteEl = document.querySelector('.daily-quote');
            const countdownTextEl = document.getElementById('countdown-text');
            const dateHeaderEl = document.querySelector('.date-header');
            const weekdayEl = document.querySelector('.weekday');

            if (lang === 'en') {
                // Switch to English - use Zen quote from JSON
                if (selectedZenQuote) {
                    dailyQuoteEl.textContent = selectedZenQuote;
                    dailyQuoteEl.style.fontSize = '2rem'; // Smaller for English
                    dailyQuoteEl.style.letterSpacing = '0.05em'; // Tighter spacing
                    dailyQuoteEl.style.lineHeight = '1.4'; // Allow line breaks
                    dailyQuoteEl.style.maxWidth = '600px'; // Constrain width for line breaks
                }

                // Translate date header
                const yearMatch = originalDateHeader.match(/(\d+)\s*年/);
                const monthMatch = originalDateHeader.match(/(\d+)\s*月/);
                if (yearMatch && monthMatch) {
                    const year = yearMatch[1];
                    const month = monthMatch[1];
                    dateHeaderEl.textContent = `${monthMap[month]} ${year}`;
                }

                // Translate weekday
                const weekdayParts = originalWeekday.split('|');
                if (weekdayParts.length === 2) {
                    const chineseWeekday = weekdayParts[0].trim();
                    const englishWeekday = weekdayMap[chineseWeekday] || chineseWeekday;
                    const englishLunarMonth = lunarMonthMap[lunarMonthNum.toString()] || lunarMonthNum;
                    const englishLunarDate = `Lunar ${englishLunarMonth} ${lunarDayNum}`;
                    weekdayEl.textContent = `${englishWeekday} | ${englishLunarDate}`;
                }

                // Translate Yi/Ji labels to English
                const jiIcon = document.querySelector('.activities img[alt="宜"]');
                const yiIcon = document.querySelector('.activities img[alt="忌"]');
                if (jiIcon) jiIcon.alt = 'Auspicious';
                if (yiIcon) yiIcon.alt = 'Inauspicious';

                // Update countdown text to English
                const daysText = countdownTextEl.querySelector('#countdown-days');
                const hoursText = countdownTextEl.querySelector('#countdown-hours');
                const minutesText = countdownTextEl.querySelector('#countdown-minutes');
                const secondsText = countdownTextEl.querySelector('#countdown-seconds');

                countdownTextEl.innerHTML = `CNY in <span class="countdown-numbers" id="countdown-days">${daysText.textContent}</span> days <span class="countdown-numbers" id="countdown-hours">${hoursText.textContent}</span> hrs <span class="countdown-numbers" id="countdown-minutes">${minutesText.textContent}</span> min <span class="countdown-numbers" id="countdown-seconds">${secondsText.textContent}</span> sec`;

                // Translate lucky hint text
                const luckyHint = document.getElementById('lucky-hint');
                if (luckyHint) luckyHint.textContent = 'Click for surprise';

                // Translate Lucky Number Modal
                const luckyModalTitle = document.querySelector('#lucky-modal h3');
                const luckyCloseBtn = document.getElementById('lucky-close');
                if (luckyModalTitle) luckyModalTitle.textContent = '🎉 Today\'s Lucky Numbers 🎉';
                if (luckyCloseBtn) luckyCloseBtn.textContent = 'Close';

                // Translate Footer
                const footer = document.querySelector('.footer');
                if (footer) footer.textContent = 'Year of the Horse 🐴 2026';
            } else {
                // Switch to Chinese
                dailyQuoteEl.textContent = originalQuote;
                dailyQuoteEl.style.fontSize = '3.2rem'; // Original size
                dailyQuoteEl.style.letterSpacing = '0.2em'; // Original spacing
                dailyQuoteEl.style.lineHeight = '1.2'; // Reset
                dailyQuoteEl.style.maxWidth = 'none'; // Reset

                // Restore original date header
                dateHeaderEl.textContent = originalDateHeader;

                // Restore original weekday
                weekdayEl.textContent = originalWeekday;

                // Restore Yi/Ji labels to Chinese
                const jiIcon = document.querySelector('.activities img[alt="Auspicious"]');
                const yiIcon = document.querySelector('.activities img[alt="Inauspicious"]');
                if (jiIcon) jiIcon.alt = '宜';
                if (yiIcon) yiIcon.alt = '忌';

                // Restore countdown text
                const daysText = countdownTextEl.querySelector('#countdown-days');
                const hoursText = countdownTextEl.querySelector('#countdown-hours');
                const minutesText = countdownTextEl.querySelector('#countdown-minutes');
                const secondsText = countdownTextEl.querySelector('#countdown-seconds');

                countdownTextEl.innerHTML = `距離農曆新年還有 <span class="countdown-numbers" id="countdown-days">${daysText.textContent}</span> 天 <span class="countdown-numbers" id="countdown-hours">${hoursText.textContent}</span> 小時 <span class="countdown-numbers" id="countdown-minutes">${minutesText.textContent}</span> 分 <span class="countdown-numbers" id="countdown-seconds">${secondsText.textContent}</span> 秒`;

                // Restore lucky hint text
                const luckyHint = document.getElementById('lucky-hint');
                if (luckyHint) luckyHint.textContent = '點擊驚喜';

                // Restore Lucky Number Modal
                const luckyModalTitle = document.querySelector('#lucky-modal h3');
                const luckyCloseBtn = document.getElementById('lucky-close');
                if (luckyModalTitle) luckyModalTitle.textContent = '🎉 今日幸運號碼 🎉';
                if (luckyCloseBtn) luckyCloseBtn.textContent = '關閉';

                // Restore Footer
                const footer = document.querySelector('.footer');
                if (footer) footer.textContent = '馬年🐴 2026';
            }
        }

        // Theme Toggle Function
        function switchTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('lakjit-theme', theme);

            if (theme === 'night') {
                document.body.classList.add('night-mode');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else if (theme === 'day') {
                document.body.classList.remove('night-mode');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                // Auto mode - use time-based logic
                checkNightModeForToggle();
            }
        }

        // Check night mode for theme toggle (doesn't change icons)
        function checkNightModeForToggle() {
            const now = new Date();
            const hour = now.getHours();
            const isNight = hour >= 20 || hour < 7;

            if (isNight) {
                document.body.classList.add('night-mode');
            } else {
                document.body.classList.remove('night-mode');
            }
        }

        // Event Listeners for toggles
        if (languageToggle) {
            languageToggle.addEventListener('click', () => {
                const newLang = currentLang === 'cn' ? 'en' : 'cn';
                switchLanguage(newLang);
            });
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                if (currentTheme === 'auto' || currentTheme === 'day') {
                    switchTheme('night');
                } else {
                    switchTheme('day');
                }
            });
        }

        // Initialize language and theme on page load (after calendar is updated)
        setTimeout(() => {
            // Store original content after calendar is loaded
            originalQuote = document.querySelector('.daily-quote').textContent;
            originalDateHeader = document.querySelector('.date-header').textContent;
            originalWeekday = document.querySelector('.weekday').textContent;

            // Apply saved preferences
            switchLanguage(currentLang);
            switchTheme(currentTheme);
        }, 100);

        // Client-side night mode detection
        function checkNightMode() {
            const now = new Date();
            const hour = now.getHours();
            const isNight = hour >= 20 || hour < 7;

            if (isNight) {
                document.body.classList.add('night-mode');
                // Switch to white incense icon in night mode
                document.getElementById('incense-icon').src = 'static/white-incense.png';
            } else {
                document.body.classList.remove('night-mode');
                // Switch to dark incense icon in day mode
                document.getElementById('incense-icon').src = 'static/dark-incense.png';
            }
        }

        // Lunar notification system
        function checkLunarNotification() {
            // 2026 Lunar Calendar: 初一 (Chu 1) and 初十五 (Chu 15) dates
            const lunarDates = [
                { date: '2026-01-03', type: '初十五' },
                { date: '2026-01-19', type: '初一' },
                { date: '2026-02-02', type: '初十五' },
                { date: '2026-02-17', type: '初一', name: 'CNY' },
                { date: '2026-03-03', type: '初十五' },
                { date: '2026-03-18', type: '初一' },
                { date: '2026-04-01', type: '初十五' },
                { date: '2026-04-17', type: '初一' },
                { date: '2026-05-01', type: '初十五' },
                { date: '2026-05-16', type: '初一' },
                { date: '2026-05-30', type: '初十五' },
                { date: '2026-06-15', type: '初一' },
                { date: '2026-06-29', type: '初十五' },
                { date: '2026-07-14', type: '初一' },
                { date: '2026-07-28', type: '初十五' },
                { date: '2026-08-12', type: '初一' },
                { date: '2026-08-26', type: '初十五' },
                { date: '2026-09-11', type: '初一' },
                { date: '2026-09-25', type: '初十五' },
                { date: '2026-10-10', type: '初一' },
                { date: '2026-10-24', type: '初十五' },
                { date: '2026-11-09', type: '初一' },
                { date: '2026-11-23', type: '初十五' },
                { date: '2026-12-09', type: '初一' },
                { date: '2026-12-23', type: '初十五' },
                { date: '2027-01-19', type: '初一' },
                { date: '2027-02-02', type: '初十五' }
            ];

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            for (const lunarDate of lunarDates) {
                const targetDate = new Date(lunarDate.date);
                targetDate.setHours(0, 0, 0, 0);

                const daysDiff = Math.floor((targetDate - today) / (1000 * 60 * 60 * 24));

                // Check if notification was already dismissed for this event
                const storageKey = `lunar-notification-${lunarDate.date}`;
                const isDismissed = localStorage.getItem(storageKey);

                if (isDismissed) {
                    continue; // Skip if already dismissed
                }

                let message = '';

                // T-minus 2 days
                if (daysDiff === 2) {
                    message = `提醒：2天後是${lunarDate.type}`;
                }
                // T-minus 1 day
                else if (daysDiff === 1) {
                    message = `提醒：明天是${lunarDate.type}`;
                }

                if (message) {
                    showNotification(message, lunarDate.date);
                    return; // Show only one notification at a time
                }
            }

            // Hide notification if no upcoming events
            hideNotification();
        }

        function showNotification(message, eventDate) {
            const notification = document.getElementById('lunar-notification');
            const notificationText = document.getElementById('notification-text');

            notificationText.textContent = message;
            notification.style.display = 'flex';
            notification.dataset.eventDate = eventDate; // Store event date for dismissal
        }

        function hideNotification() {
            const notification = document.getElementById('lunar-notification');
            notification.style.display = 'none';
        }

        function dismissNotification() {
            const notification = document.getElementById('lunar-notification');
            const eventDate = notification.dataset.eventDate;

            if (eventDate) {
                // Store dismissal in local storage
                const storageKey = `lunar-notification-${eventDate}`;
                localStorage.setItem(storageKey, 'true');
            }

            // Hide notification with fade out
            notification.style.opacity = '0';
            setTimeout(() => {
                hideNotification();
                notification.style.opacity = '1'; // Reset for next time
            }, 300);
        }

        // Share as Image Functionality
        document.getElementById('share-button').addEventListener('click', async function () {
            // Create hidden container with 4:5 aspect ratio (1080x1350)
            const shareContainer = document.createElement('div');
            shareContainer.className = 'share-container';

            // Determine current theme
            const isNightMode = document.body.classList.contains('night-mode');

            // Apply background based on theme
            if (isNightMode) {
                shareContainer.style.backgroundImage = "url('static/background-night.jpg')";
                shareContainer.style.color = '#E0E0E0';
                shareContainer.style.filter = 'brightness(0.6)';
            } else {
                shareContainer.style.backgroundImage = "url('static/background.jpg')";
                shareContainer.style.color = '#000000';
            }

            // Create content wrapper
            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'share-content';

            // Clone essential content
            // 1. Date Header (Year & Month)
            const dateHeader = document.querySelector('.date-header');
            if (dateHeader) {
                const clonedDateHeader = dateHeader.cloneNode(true);
                contentWrapper.appendChild(clonedDateHeader);
            }

            // 2. Big Date
            const bigDate = document.querySelector('.big-date');
            if (bigDate) {
                const clonedBigDate = bigDate.cloneNode(true);
                contentWrapper.appendChild(clonedBigDate);
            }

            // 3. Weekday with Lunar Date
            const weekday = document.querySelector('.weekday');
            if (weekday) {
                const clonedWeekday = weekday.cloneNode(true);
                contentWrapper.appendChild(clonedWeekday);
            }

            // 4. Divider
            const divider = document.createElement('div');
            divider.className = 'divider';
            contentWrapper.appendChild(divider);

            // 5. Activities (Yi & Ji)
            const activities = document.querySelector('.activities');
            if (activities) {
                const clonedActivities = activities.cloneNode(true);
                contentWrapper.appendChild(clonedActivities);
            }

            // 6. Daily Quote
            const dailyQuote = document.querySelector('.daily-quote');
            if (dailyQuote) {
                const clonedDailyQuote = dailyQuote.cloneNode(true);
                contentWrapper.appendChild(clonedDailyQuote);
            }

            // Append content to container
            shareContainer.appendChild(contentWrapper);

            // Append to body (hidden off-screen)
            document.body.appendChild(shareContainer);

            try {
                // Capture with html2canvas
                const canvas = await html2canvas(shareContainer, {
                    width: 1080,
                    height: 1350,
                    scale: 2, // Higher quality
                    backgroundColor: null,
                    logging: false,
                    useCORS: true
                });

                // Convert to PNG and download
                canvas.toBlob(function (blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    const today = new Date();
                    const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
                    link.download = `Lakjit-Calendar-${dateStr}.png`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                }, 'image/png');

            } catch (error) {
                console.error('Error generating image:', error);
                alert('Failed to generate image. Please try again.');
            } finally {
                // Clean up: remove hidden container
                document.body.removeChild(shareContainer);
            }
        });

        // ============================================
        // PWA INSTALLATION
        // ============================================

        let deferredPrompt;
        const installButton = document.getElementById('install-button');
        const iosTooltip = document.getElementById('ios-tooltip');

        // Check if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            // Already installed, don't show button
            installButton.style.display = 'none';
        }

        // Listen for beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing
            e.preventDefault();
            // Save the event for later
            deferredPrompt = e;
            // Show install button
            installButton.classList.add('show');
        });

        // Handle install button click
        installButton.addEventListener('click', async () => {
            // Check if iOS Safari
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

            if (isIOS && isSafari) {
                // Show iOS instructions
                iosTooltip.classList.add('show');
                setTimeout(() => {
                    iosTooltip.classList.remove('show');
                }, 5000);
                return;
            }

            if (!deferredPrompt) {
                return;
            }

            // Show the install prompt
            deferredPrompt.prompt();

            // Wait for the user's response
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response: ${outcome}`);

            // Clear the deferredPrompt
            deferredPrompt = null;

            // Hide the install button
            installButton.classList.remove('show');
        });

        // Listen for app installed event
        window.addEventListener('appinstalled', () => {
            console.log('PWA installed successfully');
            installButton.classList.remove('show');
            deferredPrompt = null;
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('Service Worker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }

        // Test Notification Button (for development)
        document.getElementById('test-notification').addEventListener('click', () => {
            // Clear any previous dismissal from localStorage
            const testDate = '2026-02-17';
            const storageKey = `lunar-notification-${testDate}`;
            localStorage.removeItem(storageKey);

            // Show test notification
            showNotification('提醒：明天是初一 (測試通知)', testDate);
        });

        // Lucky Number Feature with Slot Machine Animation
        const quoteContainer = document.getElementById('daily-quote-container');
        const luckyModal = document.getElementById('lucky-modal');
        const luckyNum1 = document.getElementById('lucky-num-1');
        const luckyNum2 = document.getElementById('lucky-num-2');
        const luckyCloseBtn = document.getElementById('lucky-close');
        const luckyHint = document.getElementById('lucky-hint');
        let autoCloseTimer;
        let hasInteracted = false;

        function generateLuckyNumber() {
            return Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        }

        function animateSlotMachine(element, finalNumber) {
            element.classList.add('animating');
            let counter = 0;
            const interval = setInterval(() => {
                element.textContent = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                counter++;
                if (counter >= 10) {
                    clearInterval(interval);
                    setTimeout(() => {
                        element.textContent = finalNumber;
                        element.classList.remove('animating');
                    }, 100);
                }
            }, 100);
        }

        function showLuckyNumbers() {
            // Hide hint after first interaction
            if (!hasInteracted) {
                luckyHint.classList.add('hidden');
                hasInteracted = true;
            }

            // Generate final numbers
            const num1 = generateLuckyNumber();
            const num2 = generateLuckyNumber();

            // Show modal
            luckyModal.classList.add('show');

            // Start slot machine animation
            setTimeout(() => {
                animateSlotMachine(luckyNum1, num1);
                animateSlotMachine(luckyNum2, num2);
            }, 200);

            // Auto-close after 10 seconds
            clearTimeout(autoCloseTimer);
            autoCloseTimer = setTimeout(() => luckyModal.classList.remove('show'), 10000);
        }

        function closeLuckyNumbers() {
            luckyModal.classList.remove('show');
            clearTimeout(autoCloseTimer);
        }

        quoteContainer.addEventListener('click', showLuckyNumbers);
        quoteContainer.addEventListener('touchend', (e) => {
            e.preventDefault();
            showLuckyNumbers();
        });
        luckyCloseBtn.addEventListener('click', closeLuckyNumbers);
        luckyModal.addEventListener('click', (e) => {
            if (e.target === luckyModal) closeLuckyNumbers();
        });
    </script>
</body>

</html>
